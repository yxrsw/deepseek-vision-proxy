<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="420" y1="0" x2="420" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="780" y1="0" x2="780" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1020" y1="0" x2="1020" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1140" y1="0" x2="1140" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>
  <!-- Glowing decorations -->
  <circle cx="200" cy="200" r="160" fill="rgba(100,149,237,0.06)"/>
  <circle cx="1000" cy="150" r="130" fill="rgba(147,112,219,0.06)"/>
  <circle cx="600" cy="350" r="100" fill="rgba(0,206,209,0.04)"/>
  <!-- Camera icon -->
  <g transform="translate(80,135)" stroke="#64b5f6" fill="none">
    <rect x="0" y="10" width="60" height="42" rx="6" stroke-width="2.5"/>
    <circle cx="30" cy="34" r="13" stroke-width="2.5"/>
    <circle cx="47" cy="18" r="4" fill="#ffd54f" stroke="none"/>
    <path d="M12 45 L25 32 L38 38 L50 28 L58 45" fill="#64b5f6" opacity="0.3" stroke="none"/>
  </g>
  <!-- Arrow from camera to bridge -->
  <line x1="170" y1="155" x2="320" y2="155" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="320,149 335,155 320,161" fill="rgba(255,255,255,0.4)"/>
  <!-- Bridge: code brackets -->
  <text x="345" y="170" fill="url(#accent)" font-size="50" font-family="monospace" font-weight="bold" filter="url(#glow)">[</text>
  <text x="460" y="155" fill="#00bcd4" font-size="28" font-family="monospace" opacity="0.6">&lt;/&gt;</text>
  <text x="450" y="170" fill="url(#accent)" font-size="50" font-family="monospace" font-weight="bold" filter="url(#glow)">]</text>
  <line x1="395" y1="182" x2="440" y2="182" stroke="#00bcd4" stroke-width="3" opacity="0.8"/>
  <line x1="395" y1="188" x2="440" y2="188" stroke="rgba(0,188,212,0.4)" stroke-width="2"/>
  <line x1="395" y1="194" x2="440" y2="194" stroke="rgba(0,188,212,0.2)" stroke-width="1"/>
  <!-- Arrow from bridge to text -->
  <line x1="510" y1="155" x2="640" y2="155" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="640,149 655,155 640,161" fill="rgba(255,255,255,0.4)"/>
  <!-- Text paragraphs -->
  <g opacity="0.4">
    <rect x="670" y="120" width="70" height="8" rx="4" fill="#80cbc4"/>
    <rect x="670" y="138" width="50" height="8" rx="4" fill="#81d4fa"/>
    <rect x="670" y="156" width="90" height="8" rx="4" fill="#ce93d8"/>
    <rect x="670" y="174" width="60" height="8" rx="4" fill="#a5d6a7"/>
    <rect x="670" y="192" width="85" height="8" rx="4" fill="#fff59d"/>
    <rect x="670" y="210" width="45" height="8" rx="4" fill="#ef9a9a"/>
  </g>
  <!-- Title -->
  <text x="600" y="270" fill="#ffffff" font-size="40" font-family="'Segoe UI',Arial,sans-serif" font-weight="700" text-anchor="middle" letter-spacing="1">DeepSeek Vision Bridge</text>
  <text x="600" y="305" fill="#81d4fa" font-size="20" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle" letter-spacing="4">Image → Text Converter</text>
  <text x="600" y="340" fill="rgba(255,255,255,0.4)" font-size="13" font-family="'Segoe UI',Arial,sans-serif" text-anchor="middle">Give your text-only LLM the ability to 'see' — automatic image description via any Vision API</text>
  <!-- Badges -->
  <rect x="200" y="365" width="75" height="22" rx="11" fill="#3776AB" opacity="0.85"/>
  <text x="237" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">Python</text>
  <rect x="285" y="365" width="95" height="22" rx="11" fill="#00A67E" opacity="0.85"/>
  <text x="332" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">OpenAI API</text>
  <rect x="390" y="365" width="110" height="22" rx="11" fill="#0078D4" opacity="0.85"/>
  <text x="445" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">Windows DPAPI</text>
  <rect x="510" y="365" width="95" height="22" rx="11" fill="#FF6F00" opacity="0.85"/>
  <text x="557" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">Codex Skill</text>
  <rect x="615" y="365" width="100" height="22" rx="11" fill="#E91E63" opacity="0.85"/>
  <text x="665" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">Cross-Platform</text>
  <rect x="725" y="365" width="120" height="22" rx="11" fill="#4CAF50" opacity="0.85"/>
  <text x="785" y="380" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">Vision-Only Mode</text>
</svg>
